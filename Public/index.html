<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Where is My College Bus</title>

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

body {
    font-family: "Segoe UI", sans-serif;
    background: linear-gradient(135deg, #667eea, #764ba2);
    min-height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    color: white;
}

/* CONTAINER */
.container {
    text-align: center;
    max-width: 520px;
    width: 100%;
}

/* TITLE */
h1 {
    font-size: 2.7rem;
    margin-bottom: 10px;
    text-shadow: 0 5px 15px rgba(0,0,0,0.3);
}

.subtitle {
    margin-bottom: 25px;
    opacity: 0.9;
}

/* STATUS BAR */
.status-bar {
    margin-bottom: 20px;
    padding: 8px 15px;
    border-radius: 20px;
    background: rgba(0,255,0,0.2);
    font-size: 0.9rem;
}

/* MENU */
.menu {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 18px;
}

/* CARD */
.card {
    padding: 25px;
    border-radius: 18px;
    background: rgba(255,255,255,0.15);
    backdrop-filter: blur(12px);
    cursor: pointer;
    transition: all 0.3s ease;
    text-decoration: none;
    color: white;
    box-shadow: 0 10px 25px rgba(0,0,0,0.3);
    position: relative;
}

/* HOVER EFFECT */
.card:hover {
    transform: translateY(-8px) scale(1.03);
    background: rgba(255,255,255,0.25);
    box-shadow: 0 15px 35px rgba(0,0,0,0.4);
}

/* ICON */
.icon {
    font-size: 2.2rem;
    margin-bottom: 10px;
}

/* FOOTER */
.footer {
    margin-top: 25px;
    font-size: 0.8rem;
    opacity: 0.7;
}

/* MOBILE */
@media (max-width: 480px) {
    .menu {
        grid-template-columns: 1fr;
    }
}
</style>
</head>

<body>

<div class="container">

    <h1>🚌 Where is My Bus?</h1>
    <p class="subtitle">College Bus Live Tracking System</p>

    <div class="status-bar" id="statusBar">
        ✅ System Online
    </div>

    <div class="menu">

        <!-- HOME -->
        <a href="/" class="card">
            <div class="icon">🏠</div>
            <h3>Home</h3>
            <p>Search & Track Bus</p>
        </a>

        <!-- USER -->
        <a href="/Frontpage.html" class="card">
            <div class="icon">👨‍🎓</div>
            <h3>User</h3>
            <p>Track Bus Location</p>
        </a>

        <!-- DRIVER -->
        <a href="/driver.html" class="card">
            <div class="icon">🧑‍✈️</div>
            <h3>Driver</h3>
            <p>Send GPS Location</p>
        </a>

        <!-- ROUTE MAP -->
        <a href="/routemap.html" class="card">
            <div class="icon">🗺️</div>
            <h3>Route Map</h3>
            <p>View Live Map</p>
        </a>

    </div>

    <div class="footer">
        🚀 Developed for College Bus Tracking Project
    </div>

</div>

<script>
/* INTERNET STATUS CHECK */
const statusBar = document.getElementById("statusBar");

function updateStatus() {
    if (navigator.onLine) {
        statusBar.textContent = "✅ System Online";
        statusBar.style.background = "rgba(0,255,0,0.2)";
    } else {
        statusBar.textContent = "⚠️ Offline Mode";
        statusBar.style.background = "rgba(255,0,0,0.3)";
    }
}

window.addEventListener("online", updateStatus);
window.addEventListener("offline", updateStatus);
updateStatus();
</script>

</body>
</html>
