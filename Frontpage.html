<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Where is my Bus? - College Bus Tracker</title>

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
    min-height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    padding: 20px;
    color: white;
}

/* Container */
.container {
    width: 100%;
    max-width: 520px;
    text-align: center;
}

/* Heading */
h1 {
    font-size: clamp(2rem, 6vw, 3.2rem);
    margin-bottom: 15px;
    font-weight: 700;
    text-shadow: 0 4px 12px rgba(0,0,0,0.3);
}

.subtitle {
    font-size: clamp(1rem, 3.5vw, 1.3rem);
    margin-bottom: 35px;
    opacity: 0.95;
}

/* Search */
.search-container {
    position: relative;
    width: 100%;
}

.search-input {
    width: 100%;
    padding: 18px 110px 18px 25px;
    font-size: 1.1rem;
    border: none;
    border-radius: 50px;
    outline: none;
    box-shadow: 0 10px 30px rgba(0,0,0,0.3);
    background: rgba(255,255,255,0.95);
    transition: 0.3s ease;
}

.search-input:focus {
    transform: scale(1.02);
}

.track-btn {
    position: absolute;
    right: 6px;
    top: 6px;
    height: 44px;
    min-width: 90px;
    border: none;
    border-radius: 25px;
    background: linear-gradient(45deg, #ff6b6b, #feca57);
    color: white;
    font-size: 1rem;
    font-weight: 600;
    cursor: pointer;
    transition: 0.3s ease;
}

.track-btn:hover:not([disabled]) {
    transform: translateY(-2px);
}

.track-btn[disabled] {
    opacity: 0.6;
    cursor: not-allowed;
}

/* Loading & Error */
.loading {
    margin-top: 20px;
    font-size: 1rem;
    display: none;
}

.loading.show {
    display: block;
    animation: pulse 1.5s infinite;
}

@keyframes pulse {
    0%,100% { opacity: 1; }
    50% { opacity: 0.5; }
}

.error {
    margin-top: 15px;
    padding: 10px 18px;
    border-radius: 25px;
    background: rgba(255, 0, 0, 0.2);
    display: none;
    font-size: 0.95rem;
}

/* Examples */
.examples {
    margin-top: 30px;
    font-size: 0.9rem;
    opacity: 0.8;
}

.examples span {
    background: rgba(255,255,255,0.2);
    padding: 4px 10px;
    margin: 0 4px;
    border-radius: 15px;
}

/* 📱 Small Mobile */
@media (max-width: 480px) {
    body {
        align-items: flex-start;
        padding-top: 60px;
    }

    .search-input {
        padding: 16px 100px 16px 20px;
    }

    .track-btn {
        min-width: 80px;
        font-size: 0.9rem;
    }
}

/* 📟 Tablet */
@media (min-width: 768px) {
    .container {
        max-width: 600px;
    }
}
</style>
</head>

<body>

<div class="container">
    <h1>🚌 Where is my Bus?</h1>
    <p class="subtitle">Track your college bus live location in real-time</p>

    <form id="searchForm" action="/track" method="post">
        <div class="search-container">
            <input 
                type="text"
                name="bus"
                id="busInput"
                class="search-input"
                placeholder="Enter Bus Number (e.g. BUS001)"
                maxlength="10"
                required
            >
            <button type="submit" class="track-btn" id="trackBtn" disabled>Track</button>
        </div>
    </form>

    <div class="loading" id="loading">🔍 Finding your bus...</div>
    <div class="error" id="errorMsg"></div>

    <div class="examples">
        Try: <span>BUS001</span> <span>BUS002</span> <span>SHUTTLE-A</span>
    </div>
</div>

<script>
const form = document.getElementById('searchForm');
const input = document.getElementById('busInput');
const btn = document.getElementById('trackBtn');
const loading = document.getElementById('loading');
const errorMsg = document.getElementById('errorMsg');

input.addEventListener('input', () => {
    input.value = input.value.toUpperCase();
    btn.disabled = input.value.trim().length < 3;
    errorMsg.style.display = 'none';
});

form.addEventListener('submit', (e) => {
    if (input.value.trim().length < 3) {
        e.preventDefault();
        input.focus();
        return;
    }
    btn.disabled = true;
    btn.textContent = "GO";
    loading.classList.add('show');
});
</script>

</body>
</html>
