
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Where is my Bus? - College Bus Tracker</title>

<style>
* { margin:0; padding:0; box-sizing:border-box; }

body {
    font-family: 'Segoe UI', sans-serif;
    background: linear-gradient(135deg,#667eea,#764ba2);
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    padding:20px;
    color:white;
}

.container {
    width:100%;
    max-width:520px;
    text-align:center;
}

h1 {
    font-size:clamp(2rem,6vw,3rem);
    margin-bottom:15px;
}

.subtitle {
    margin-bottom:30px;
}

/* SEARCH */
.search-container { position:relative; }

.search-input {
    width:100%;
    padding:18px 110px 18px 25px;
    border-radius:50px;
    border:none;
    outline:none;
}

.track-btn {
    position:absolute;
    right:6px;
    top:6px;
    height:44px;
    border:none;
    border-radius:25px;
    background: linear-gradient(45deg,#ff6b6b,#feca57);
    color:white;
    cursor:pointer;
}

.track-btn:disabled {
    opacity:0.6;
}

/* LOADING */
.loading {
    margin-top:20px;
    display:none;
}

.loading.show {
    display:block;
}

/* ERROR */
.error {
    margin-top:15px;
    padding:10px;
    border-radius:20px;
    background: rgba(255,0,0,0.3);
    display:none;
}

/* EXAMPLES */
.examples {
    margin-top:25px;
}

.examples span {
    background: rgba(255,255,255,0.2);
    padding:5px 10px;
    margin:5px;
    border-radius:15px;
    cursor:pointer;
}
</style>
</head>

<body>

<div class="container">
    <h1>🚌 Where is my Bus?</h1>
    <p class="subtitle">Track your college bus live location</p>

    <div class="search-container">
        <input id="busInput" class="search-input" placeholder="Enter Bus ID (BUS001)">
        <button class="track-btn" id="trackBtn" disabled>Track</button>
    </div>

    <div class="loading" id="loading">🔍 Checking bus...</div>
    <div class="error" id="errorMsg"></div>

    <div class="examples">
        Try:
        <span onclick="setExample('BUS001')">BUS001</span>
        <span onclick="setExample('BUS002')">BUS002</span>
        <span onclick="setExample('SHUTTLE-A')">SHUTTLE-A</span>
    </div>
</div>

<!-- 🔥 FIREBASE SCRIPT -->
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getDatabase, ref, get } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

/* CONFIG */
const firebaseConfig = {
    apiKey: "AIzaSyBIfqL2iOksHYZlboVQ3q1iU-DO2sTCJrY",
    authDomain: "whereismybus-ebe42.firebaseapp.com",
    databaseURL: "https://whereismybus-ebe42-default-rtdb.firebaseio.com",
    projectId: "whereismybus-ebe42",
    storageBucket: "whereismybus-ebe42.firebasestorage.app",
    messagingSenderId: "683775175774",
    appId: "1:683775175774:web:dc47e18df198232a2058cf"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

/* UI */
const input = document.getElementById('busInput');
const btn = document.getElementById('trackBtn');
const loading = document.getElementById('loading');
const errorMsg = document.getElementById('errorMsg');

/* ENABLE BUTTON */
input.addEventListener('input', () => {
    input.value = input.value.toUpperCase();
    btn.disabled = input.value.trim().length < 3;
    errorMsg.style.display = 'none';
});

/* CLICK TRACK */
btn.addEventListener('click', checkBus);

/* ENTER KEY */
input.addEventListener('keypress', (e) => {
    if (e.key === "Enter") checkBus();
});

/* EXAMPLES */
window.setExample = function(id){
    input.value = id;
    btn.disabled = false;
};

/* 🔥 CHECK FIREBASE */
async function checkBus(){

    const busId = input.value.trim();

    if(busId.length < 3){
        errorMsg.textContent = "❌ Enter valid Bus ID";
        errorMsg.style.display = "block";
        return;
    }

    loading.classList.add('show');
    btn.disabled = true;

    try {
        const snapshot = await get(ref(db, "buses/" + busId));

        if(snapshot.exists()){
            localStorage.setItem("busId", busId);

            // redirect
            window.location.href = "/routemap.html";

        } else {
            errorMsg.textContent = "❌ Bus not found!";
            errorMsg.style.display = "block";
        }

    } catch (err) {
        errorMsg.textContent = "⚠️ Network Error!";
        errorMsg.style.display = "block";
    }

    loading.classList.remove('show');
    btn.disabled = false;
}
</script>

</body>
</html>
